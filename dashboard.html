<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - StudyShare</title>
<link rel="stylesheet" href="dashbord.css">
</head>

<body>

<div class="sidebar">

    <h2>StudyShare</h2>

    <ul>
        <li>🏠 Dashboard</li>
        <li>📚 My Notes</li>
        <li>⬆️ Upload Notes</li>
        <li>👤 Profile</li>
        <li id="logoutBtn">🚪 Logout</li>
    </ul>

</div>

<div class="main">

    <div class="topbar">
        <h1>Welcome Back 👋</h1>
    </div>

    <div class="cards">

        <div class="card">
            <h2>12</h2>
            <p>Total Notes</p>
        </div>

        <div class="card">
            <h2>5</h2>
            <p>Subjects</p>
        </div>

        <div class="card">
            <h2>150</h2>
            <p>Downloads</p>
        </div>

    </div>

    <div class="upload-section">

        <h2>Quick Upload</h2>

        <a href="upload.html" class="upload-btn">
            Upload Notes
        </a>
        <a href="notes.html" class="notes-btn"> View All Notes</a>

    </div>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
